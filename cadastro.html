<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linketinder - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Linketinder</h1>
        <p>O match perfeito entre talentos e empresas!</p>
    </header>
    </header>

    <nav class="menu-navegacao">
        <a href="cadastro.html">Área de Cadastro</a>
        <a href="perfil-empresa.html">Visão da Empresa</a>
        <a href="perfil-candidato.html">Visão do Candidato</a>
    </nav>

    <main class="container">

        <main class="container">
            <section class="card">
                <h2>Cadastro de Candidato</h2>
                <form id="form-candidato">
                    <input type="text" id="nome-cand" placeholder="Nome Completo" required>
                    <input type="email" id="email-cand" placeholder="E-mail" required>
                    <input type="text" id="cpf-cand" placeholder="CPF" required>
                    <input type="number" id="idade-cand" placeholder="Idade" required>
                    <input type="text" id="estado-cand" placeholder="Estado (ex: PI)" required>
                    <input type="text" id="cep-cand" placeholder="CEP" required>
                    <textarea id="descricao-cand" placeholder="Fale sobre você e sua experiência" required></textarea>
                    <input type="text" id="habilidades-cand"
                        placeholder="Habilidades (separe por vírgula, ex: Java, Spring)" required>
                    <button type="submit">Cadastrar Candidato</button>
                </form>
            </section>

            <section class="card">
                <h2>Cadastro de Empresa</h2>
                <form id="form-empresa">
                    <input type="text" id="nome-emp" placeholder="Nome da Empresa" required>
                    <input type="email" id="email-emp" placeholder="E-mail Corporativo" required>
                    <input type="text" id="cnpj-emp" placeholder="CNPJ" required>
                    <input type="text" id="pais-emp" placeholder="País" required>
                    <input type="text" id="estado-emp" placeholder="Estado (ex: SP)" required>
                    <input type="text" id="cep-emp" placeholder="CEP" required>
                    <textarea id="descricao-emp" placeholder="Descrição da Vaga (O que vocês buscam?)"
                        required></textarea>
                    <input type="text" id="habilidades-emp" placeholder="Habilidades exigidas (separe por vírgula)"
                        required>
                    <button type="submit">Cadastrar Empresa e Vaga</button>
                </form>
            </section>
        </main>

        <script type="module" src="/dist/cadastro.js"></script>
</body>

</html>
