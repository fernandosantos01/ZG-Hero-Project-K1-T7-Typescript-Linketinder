<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linketinder - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Linketinder</h1>
        <p>O match perfeito entre talentos e empresas!</p>
    </header>
    </header>

    <nav class="menu-navegacao">
        <a href="cadastro.html">Área de Cadastro</a>
        <a href="perfil-empresa.html">Visão da Empresa</a>
        <a href="perfil-candidato.html">Visão do Candidato</a>
    </nav>

    <main class="container">

        <main class="container">
            <section class="card">
                <h2>Cadastro de Candidato</h2>
                <form id="form-candidato">
                    <input type="text" id="nome-cand" placeholder="Nome Completo" required>
                    <input type="email" id="email-cand" placeholder="E-mail" required>
                    <input type="text" id="cpf-cand" placeholder="CPF (000.000.000-00)" required>
                    <input type="text" id="telefone-cand" placeholder="Telefone (00) 00000-0000" required>
                    <input type="text" id="linkedin-cand" placeholder="LinkedIn (URL completa)" required>
                    <input type="number" id="idade-cand" placeholder="Idade" required>
                    <input type="text" id="estado-cand" placeholder="Estado (ex: PI)" required>
                    <input type="text" id="cep-cand" placeholder="CEP (00000-000)" required>
                    <textarea id="descricao-cand" placeholder="Fale sobre você e sua experiência" required></textarea>
                    <input type="text" id="habilidades-cand"
                        placeholder="Habilidades (separe por vírgula, ex: Java, Spring)" required>
                    <button type="submit">Cadastrar Candidato</button>
                </form>
            </section>

            <section class="card">
            <h2>Cadastro de Empresa</h2>
            <form id="form-empresa">
                <input type="text"  id="nome-emp"    placeholder="Nome da Empresa" required>
                <input type="email" id="email-emp"   placeholder="E-mail Corporativo" required>
                <input type="text"  id="cnpj-emp"    placeholder="CNPJ (00.000.000/0000-00)" required>
                <input type="text"  id="pais-emp"    placeholder="País" required>
                <input type="text"  id="estado-emp"  placeholder="Estado (ex: SP)" required>
                <input type="text"  id="cep-emp"     placeholder="CEP (00000-000)" required>
                <textarea id="descricao-emp" placeholder="Descrição da empresa e cultura" required></textarea>
                <button type="submit">Cadastrar Empresa</button>
            </form>
        </section>

            <section class="card">
            <h2>Publicar Vaga</h2>
            <form id="form-vaga">
                <div class="autocomplete-wrapper">
                    <input type="text" id="busca-empresa-vaga"
                           placeholder="Buscar empresa pelo nome..." autocomplete="off">
                    <ul id="sugestoes-empresa" class="sugestoes-lista"></ul>
                    <input type="hidden" id="empresa-id-vaga">
                </div>
                <input type="text" id="titulo-vaga"
                       placeholder="Título da Vaga (ex: Dev Groovy Sênior)" required>
                <textarea           id="descricao-vaga"
                          placeholder="Descrição da vaga e responsabilidades" required></textarea>
                <input type="text" id="local-vaga"
                       placeholder="Local (ex: Remoto, São Paulo/SP)" required>
                <input type="text" id="competencias-vaga"
                       placeholder="Competências exigidas (ex: Java, SQL, Docker)" required>
                <button type="submit">Publicar Vaga</button>
            </form>
        </section>
        </main>

        <script type="module" src="/dist/formularioCadastro.js"></script>
</body>

</html>
